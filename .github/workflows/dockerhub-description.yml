name: Sync Docker Hub description

on:
  push:
    branches: [main]
    paths:
      - README.md
      - .github/workflows/dockerhub-description.yml
  workflow_dispatch:

jobs:
  description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: leachim2k/face-movie
          short-description: Turn years of daily selfies into a smoothly morphed time-lapse video.
          # Rewrites relative paths like ./docs/demo.gif into absolute GitHub raw URLs
          # so images render correctly on Docker Hub.
          enable-url-completion: true
